# config/settings.yaml
# ==============================================================
# 뉴스레터 시스템 설정 — 이 파일 하나로 모든 것을 설정합니다.
# 코드 수정 불필요. 변경 후 GitHub에 커밋하면 반영됩니다.
# ==============================================================

# --------------------------------------------------------------
# 수신자 이메일
# --------------------------------------------------------------
# ⚠ 저장소가 public이면 이 파일에 이메일을 입력하지 마세요.
#
# 설정 방법 (GitHub Secrets 권장):
#   GitHub 저장소 → Settings → Secrets and variables → Actions
#   → RECIPIENT_EMAIL 에 이메일 주소를 입력하세요.
#   환경변수가 설정되어 있으면 아래 값은 무시됩니다.
#
# 로컬 테스트 전용으로만 여기에 입력하세요 (커밋하지 말 것):
recipient:
  email: your.email@example.com

# --------------------------------------------------------------
# 발송 일정
# --------------------------------------------------------------
# 변경 후 터미널에서 `pnpm sync-schedule` 실행 → daily.yml 자동 업데이트
#
# time_utc 예시 (UTC 기준, KST = UTC+9):
#   '00:00'  = 09:00 KST   '01:00'  = 10:00 KST
#   '02:00'  = 11:00 KST   '22:00'  = 07:00 KST (다음날)
#
# days 선택지:
#   daily     = 매일 (기본값)
#   weekdays  = 평일만 (월~금)
#   weekends  = 주말만 (토~일)
#   weekly    = 주 1회 (매주 월요일)
#   biweekly  = 격주 1회 (매달 1일·15일 기준)
schedule:
  time_utc: '12:00'   # UTC 기준 발송 시각 (12:00 UTC = 08:00 Chicago CDT / 07:00 CST)
  days: daily          # daily / weekdays / weekends / weekly / biweekly

# --------------------------------------------------------------
# Gemini AI 모델 설정
# --------------------------------------------------------------
# 사용 가능한 무료 모델 (2026년 4월 기준):
#   gemini-2.5-flash       — 추천. 일 250회 제한
#   gemini-2.5-flash-lite  — 폴백. 일 1,000회 제한 (품질 낮음)
#
# 호출 횟수 계산 방법:
#   기사 1개 = Gemini 호출 1번 = 1회 차감.
#   예) 신규 기사 8개 → 8회 사용.
#   로펌 10~15개에서 하루 신규 기사 1~3개씩이면 보통 20~45회/일 수준으로
#   250회 제한에 여유가 있습니다. 250회를 초과하면 flash-lite로 자동 전환됩니다.
#
# API 키 변경 방법:
#   GitHub 저장소 → Settings → Secrets and variables → Actions
#   → GEMINI_API_KEY 값을 수정하세요. 이 파일에 절대 입력하지 마세요.
gemini:
  primary_model: gemini-2.5-flash      # 기본 AI 모델
  fallback_model: gemini-2.5-flash-lite # 할당량 초과 시 폴백 모델
  concurrency: 3  # 기사 1개당 요약 1번 호출. 이 숫자만큼 동시에 병렬 호출합니다.
                  # 높이면 빠르지만 Gemini 분당 할당량(10회)을 빠르게 소진합니다.

# --------------------------------------------------------------
# 다이제스트 생성 설정
# --------------------------------------------------------------
digest:
  # 기사 본문이 이 글자 수 미만이면 AI 요약을 건너뜁니다.
  # 예: 100 = 100자 미만은 요약 생략 / 0 = 모든 기사 요약 시도
  min_body_chars: 100

# --------------------------------------------------------------
# AI 요약 지시 (프롬프트)
# --------------------------------------------------------------
# 수집된 기사 1개당 Gemini 호출 1번. 아래 지시문이 그 호출에 사용됩니다.
#
# instruction_ko — 한국어 로펌 기사(김앤장, 태평양 등)에 사용.
#   기사 원문(한국어)을 그대로 받아 한국어로 요약합니다.
#
# instruction_en — 영어 로펌 기사(Cooley, Latham 등)에 사용.
#   영어 원문을 받아 한국어로 번역·요약합니다.
#
# 수정 예시:
#   "3줄 이내로 핵심만 요약하세요."
#   "실무적 시사점 중심으로 요약하세요."
#   "M&A·규제·소송 관련 내용이면 특히 강조하세요."
prompt:
  instruction_ko: |
    독자는 바쁜 변호사 및 법률 전문가입니다. 아래 순서로 2~4줄 요약을 작성하세요.
    1. 핵심 법적 사안 (규제·판례·거래·입법 중 무엇인지, 구체적으로)
    2. 영향받는 대상 (기업·업종·투자자 등)
    3. 실무 시사점 (대응 방향 또는 주의할 점)
    법률 용어는 그대로 보존하고, 일반적 설명 없이 핵심만 기술하세요.
  instruction_en: |
    Readers are Korean lawyers and legal professionals who need to quickly grasp
    industry trends. Summarize in Korean (한국어), 2~4 sentences:
    1. The core legal development (regulation, ruling, deal, or legislation — be specific)
    2. Who is affected (companies, sectors, investors)
    3. Practical implication (what to watch or do)
    Preserve legal terms. Be precise, not general.
