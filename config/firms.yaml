# =============================================================
# 추적 대상 로펌 목록 (LegalNewsletter)
# -------------------------------------------------------------
# 이 파일은 매일 수집할 로펌 뉴스레터 목록입니다.
# 로펌을 추가하려면 아래 firms: 리스트에 블록을 하나 더 추가하세요.
# 코드 수정은 필요 없고, 이 파일 한 곳만 수정하면 됩니다.
#
# 각 필드 설명:
#   id          : 영문 소문자 slug. 상태(state) 저장 key 로 사용되므로
#                 한 번 정한 값은 변경 금지. (변경 시 중복 이메일 발송 가능)
#   name        : 이메일에 표시될 사람-읽기용 이름 (원문 그대로 표기)
#   language    : 원문 언어 코드. 'ko' (한국어) 또는 'en' (영어)
#   type        : 수집 방식.
#                 - Phase 1: 'rss' 만 지원
#                 - Phase 2: 'html' 추가 (HTML 스크래핑)
#                 - Phase 4: 'js-render' 조건부 추가 (JS 렌더링 필요 시)
#                 - Phase 9: 'sitemap' 추가 (WordPress post-sitemap.xml → top-N)
#   url         : RSS 피드의 절대 URL (https:// 포함, type: rss 인 경우)
#   timezone    : 사이트가 사용하는 IANA 표준 시간대
#                 예) America/Los_Angeles, Asia/Seoul, Europe/London
#   enabled     : true 면 매일 실행, false 면 일시 비활성화.
#                 블록 삭제 없이도 건너뛸 수 있습니다.
#   detail_tier : detail 페이지 fetch 방식 (Phase 7+).
#                 - 생략 시 기본값 'static' (Phase 1-6 behavior)
#                 - 'js-render' 시 enrichBody 가 Playwright 로 detail 페이지를 가져옵니다.
#                   list 페이지는 static HTML 인데 detail 페이지만 SPA 인 경우(bkl, kim-chang).
#                 - type: 'js-render' 인 firm 도 명시적으로 선언 권장 (Phase 7 migration).
#                 - ⚠ type: 'sitemap' firm 에는 detail_tier 필드를 사용하지 마세요 (WR-03):
#                   sitemap 티어는 항상 Playwright 로 detail 을 가져오도록
#                   enrichBody 가 OR-gate 로 강제합니다 (Phase 9 D-05).
#                   'detail_tier: js-render' 는 zod superRefine 이 거부하고,
#                   'detail_tier: static' 은 zod 기본값과 구별할 수 없어
#                   스키마 단계에서 통과하지만 runtime 에서는 무시됩니다.
#                   즉 sitemap firm 에서 'detail_tier: static' 을 적어도
#                   그 값은 아무 동작도 하지 않습니다 — 필드를 생략하세요.
#   latest_n    : (type: sitemap 전용) sitemap XML 에서 가져올 최신 article 수.
#                 생략 시 기본값 10 (src/scrapers/sitemap.ts DEFAULT_LATEST_N).
# -------------------------------------------------------------
# Phase 1 seed firm 주석 (01-02 probe, W4):
#   Cooley 의 메인 사이트 www.cooley.com 은 2026-04-17 probe 시점에
#   공개 RSS 피드를 전혀 제공하지 않음 (D-02 후보 6개 URL 모두 404).
#   Cooley 가 자체 운영하는 WordPress 서브사이트 cooleygo.com
#   (스타트업/회사법/IP 대상 "Cooley GO" 퍼블리케이션) 는 RSS 를 제공하며,
#   사용자 결정(Option B)에 따라 Phase 1 seed 로 이 URL 을 채택.
#   state key 슬러그는 'cooley' 를 유지 (Phase 2 에서 메인 사이트가
#   HTML 티어로 들어올 때 'cooley-go' / 'cooley' 로 분리할 수 있도록).
# =============================================================
# Phase 2 + Phase 4 firm list (locked 2026-04-18):
#   Phase 2 live firms (9): 3 RSS (cooley, clifford-chance, freshfields),
#                           4 HTML plain-href (shin-kim, yulchon, logos, skadden),
#                           2 HTML onclick-extract (kim-chang, bkl).
#   Phase 4 activations (4): lee-ko, yoon-yang, latham (flipped from disabled
#                            placeholder to type js-render) + barun (new block).
#                            All four require a wait_for CSS selector — zod
#                            superRefine enforces at config-load time.
#
# Added in Phase 4:
#   tier 'js-render'     : Playwright chromium --only-shell fetches + hydrates
#                          the list page before cheerio extraction.
#   wait_for             : CSS selector page.waitForSelector() must resolve
#                          before reading content(). 15s timeout hardcoded.
# =============================================================

firms:
  # ----- Sitemap-tier firm (1) — WordPress Cooley GO via post-sitemap.xml -----
  # Phase 9 migration (2026-04-20): Cooley RSS endpoint (/feed/) was
  # Cloudflare-challenge-blocked starting 2026-04-19. Phase 9 pivots to
  # WordPress sitemap discovery: GET post-sitemap.xml via Playwright
  # context.request.get → parse <url><lastmod> → top-N recent article URLs
  # → Playwright detail fetch (enrichBody js-render branch) for
  # .post-content body via the generic extractBody chain. state key slug
  # 'cooley' preserved (SeenState continuity — Phase 2 firms.yaml comment
  # requirement). See .planning/backlog/resolved/cooley-cf-bypass.md for
  # probe evidence.
  #
  # WR-02 risk (2026-04-20 code review): canonicalizeUrl
  # (src/scrapers/util.ts:96) strips leading 'www.' from every URL during
  # dedup normalization, so each sitemap <loc>
  # 'https://www.cooleygo.com/<slug>/' becomes
  # 'https://cooleygo.com/<slug>' on RawItem.url. enrichBody passes that
  # URL verbatim to Playwright page.goto(). This is the exact pattern
  # that broke bkl (07-06) and kim-chang (07-05) — their apex TLS cert
  # didn't cover the bare domain. cooleygo.com apex currently serves
  # detail pages identically to www.cooleygo.com (empirically verified
  # at time of Phase 9 UAT), but this is fragile — if Cloudflare or
  # Cooley ever tighten apex handling, detail bodies will regress.
  # Planned fix: 'restoreFetchHost(itemUrl, firmUrl)' in enrichBody +
  # firmAudit, scoped to fetch only (dedup canonicalization unchanged),
  # will fix bkl/kim-chang and close this risk in one change. See
  # .planning/phases/07-spa-aware-detail-tier/07-05-SUMMARY.md.
  - id: cooley
    name: Cooley
    language: en
    type: sitemap
    url: https://www.cooleygo.com/post-sitemap.xml
    timezone: America/Los_Angeles
    enabled: true
    latest_n: 10  # top-N most-recent articles by <lastmod> (explicit per D-06)

  # ----- UK RSS firms (2) -----
  - id: clifford-chance
    name: Clifford Chance
    language: en
    type: rss
    url: https://www.cliffordchance.com/rss/rss-feed-briefings.html
    timezone: Europe/London
    enabled: true

  - id: freshfields
    name: Freshfields
    language: en
    type: rss
    url: https://www.freshfields.com/en/rss/news
    timezone: Europe/London
    enabled: true

  # ----- KR HTML plain-href firms (3) -----
  - id: shin-kim
    name: 세종
    language: ko
    type: html
    url: https://www.shinkim.com/kor/media/newsletter
    timezone: Asia/Seoul
    enabled: true
    selectors:
      list_item: ".post-prime"
      title: "a.text"
      link: "a.text"
      date: ".foot-item.posted"
      body: ".post-content"

  - id: yulchon
    name: 율촌
    language: ko
    type: html
    url: https://www.yulchon.com/ko/resources/publications/newsletter.do
    timezone: Asia/Seoul
    enabled: true
    selectors:
      list_item: "ul.list_type_post > li"
      title: "p.title"
      link: "a.post_link"
      date: "p.date"

  - id: logos
    name: 법무법인 로고스
    language: ko
    type: html
    url: https://www.lawlogos.com/sub/news/newsletter.asp
    timezone: Asia/Seoul
    enabled: true
    # Phase 7-04 selector fix (2026-04-20): live HTML uses
    # <div class="board-box"><div class="list"><a><div class="text"><h5>title</h5>
    # <div class="flex-box"><p>등록일<em>YYYY.MM.DD</em></p><p>조회수<em>N</em></p>
    # — not the <tr> layout assumed in Phase 2. Date = first <em> inside .flex-box.
    selectors:
      list_item: ".board-box .list"
      title: "h5"
      link: "a"
      date: ".flex-box em"

  # ----- US HTML plain-href firm (1) — monthly cadence, expect silent weeks -----
  # Phase 7-04 selector fix (2026-04-20): skadden.com/insights migrated off
  # Drupal `.views-row` to an Angular app. The statically-rendered list lives in
  # `<section class="search-landing-listing">` under `<ul class="tile-listing">`
  # where each `<li class="tile-listing__cell">` wraps `<a class="tile-insight"
  # href="..."><div class="tile-insight__title">...</div><div class="tile-insight__date">Mon D, YYYY</div></a>`.
  # Only the top ~3 items are server-rendered (the rest load via JS pagination);
  # that is acceptable for a daily-cron digest — we never need the back catalog.
  - id: skadden
    name: Skadden
    language: en
    type: html
    url: https://www.skadden.com/insights
    timezone: America/New_York
    enabled: true
    selectors:
      list_item: "li.tile-listing__cell"
      title: ".tile-insight__title"
      link: "a.tile-insight"
      date: ".tile-insight__date"

  # ----- KR HTML onclick-extract firms (2) — require link_onclick_regex + link_template -----
  - id: kim-chang
    name: 김앤장 법률사무소
    language: ko
    type: html
    url: https://www.kimchang.com/ko/newsletter.kc
    timezone: Asia/Seoul
    # Phase 7-05 investigation (2026-04-20): disabled because our canonicalizeUrl
    # helper (src/scrapers/util.ts:96) strips leading 'www.' from every URL, so
    # list-parse produces detail URLs of the form 'https://kimchang.com/...'
    # — but kim-chang's TLS certificate only covers 'www.kimchang.com' (CN=
    # www.kimchang.com, SAN does not include the apex 'kimchang.com'). Every
    # detail fetch therefore fails with ERR_CERT_COMMON_NAME_INVALID (both in
    # Playwright and static fetch) — audit reports "0/2 detail fetches
    # succeeded". List fetch works because firm.url is used as-is (un-
    # canonicalized) and already contains 'www.'. Evidence + full fix path
    # are recorded in .planning/phases/07-spa-aware-detail-tier/07-05-SUMMARY.md.
    # Re-enable when a future phase adds host restoration on detail fetch
    # (scoped to enrichBody + firmAudit — does not touch dedup canonicalization).
    # Selectors + detail_tier preserved so re-enablement is a one-line
    # 'enabled: true' flip.
    enabled: false  # disabled 2026-04-20 (Phase 7-05) — TLS cert CN mismatch after canonicalizeUrl strips 'www.'. See 07-05-SUMMARY.md.
    detail_tier: 'js-render'  # Phase 7 DETAIL-04 declared — activation blocked by canonicalize+TLS interaction; preserved for future re-enablement
    selectors:
      list_item: "ul.notice_list > li"
      title: ".notice_txt .title, .notice_txt._dotdotdot_news"
      link_onclick_regex: "goDetail\\('(\\d+)','(\\d+)'\\)"
      link_template: "https://www.kimchang.com/ko/insights/detail.kc?sch_section={1}&idx={2}"
      date: ".notice_date"

  - id: bkl
    name: 태평양
    language: ko
    type: html
    url: https://www.bkl.co.kr/law/insight/informationList.do?lang=ko
    timezone: Asia/Seoul
    # Phase 7-06 verification (2026-04-20): disabled for the same root cause
    # as kim-chang (07-05) — canonicalizeUrl (src/scrapers/util.ts:96) strips
    # leading 'www.' from every URL, so list-parse produces detail URLs of the
    # form 'https://bkl.co.kr/law/insight/informationView.do?infoNo=NNNN&lang=ko'.
    # But bkl.co.kr (bare apex) issues `HTTP 302 → https://www.bkl.co.kr/`
    # (path-stripping redirect to homepage). Playwright follows the redirect
    # and lands on the homepage; the body selector `.view-type1` matches the
    # homepage nav wrapper ("INTRO NEWS INSIGHTS ABOUT ABOUT BKL 론스타…"),
    # identical across every detail URL. This caused the v1.0 UAT (2026-04-19)
    # hallucination pattern — every Gemini summary began with "법무법인 태평양은
    # 1980년에 설립된…" because the title was the only per-item signal.
    #
    # Evidence:
    #   curl -sI "https://bkl.co.kr/law/insight/informationView.do?infoNo=6542&lang=ko"
    #     → HTTP/2 302  location: https://www.bkl.co.kr/
    #   curl -sI "https://www.bkl.co.kr/law/insight/informationView.do?infoNo=6542&lang=ko"
    #     → HTTP/2 200  (article page; body 62KB, title "소식자료 - 법무법인 태평양")
    #   (probed via scripts/_tmp-bkl-uat-probe.ts during 07-06, deleted post-diagnosis)
    #
    # The correct body selector for the article page IS `.view-type1` (842ch
    # "부고…영결식 엄수" for infoNo=6542, 992ch for 6541, 894ch for 6540 —
    # distinct per item), but the selector cannot activate while the URL
    # canonicalization strips 'www.' and the redirect strips the path.
    #
    # Fix scope: identical to kim-chang's scoped follow-up (07-05-SUMMARY.md
    # "URL-handling fix plan") — add `restoreFetchHost(itemUrl, firmUrl)` in
    # `src/pipeline/enrichBody.ts` + `src/audit/firmAudit.ts#probeHtmlFirm`
    # that restores `www.` on fetch URL when firm.url has it. One follow-up
    # plan fixes both bkl and kim-chang. Re-enable is a one-line `enabled:
    # true` flip + adding `body: ".view-type1"` under selectors once the code
    # fix lands.
    #
    # SUMMARY.md reference: 07-06-SUMMARY.md "Deviations from Plan".
    enabled: false  # disabled 2026-04-20 (Phase 7-06) — same canonicalize+www root cause as kim-chang 07-05; v1.0 hallucination persisted. See 07-06-SUMMARY.md.
    detail_tier: 'js-render'  # Phase 7 — list is static HTML, detail is SPA (v1.0 UAT hallucination fix); activation blocked by canonicalize+www-redirect; preserved for future re-enablement
    selectors:
      list_item: "ul li.info-item, ul li"
      title: ".info-title, .title"
      link_onclick_regex: "goView\\('(\\d+)'\\)"
      link_template: "/law/insight/informationView.do?infoNo={1}&lang=ko"
      date: ".info-date, .date"

  # ----- KR js-render firms (2) — activated in Phase 4 (probe-verified 2026-04-19) -----
  - id: lee-ko
    name: 광장
    language: ko
    type: js-render
    url: https://www.leeko.com/leenko/news/newsLetterList.do?lang=KR
    wait_for: ".leeko-new-newsletter__item"
    timezone: Asia/Seoul
    enabled: true
    detail_tier: 'js-render'  # Phase 7 migration — explicit declaration (preserves Phase 4 behavior after type-gate removal)
    selectors:
      list_item: ".leeko-new-newsletter__item"
      title: ".leeko-new-newsletter__item-title"
      link_onclick_regex: "goDetail\\('([0-9]+)'\\)"
      link_template: "/leenko/news/newsLetterView.do?lang=KR&newsletterNo={1}"
      date: ".leeko-new-newsletter__item-date"
      # Phase 7-04 body selector fix (2026-04-20): the generic chain was
      # hitting a short author-contact block (~32-39 chars per item, all
      # beginning with "T02-... E...@leeko.com"). The real article body lives
      # in `.leeko-board-detail__contents` (~5000+ chars per item, direct text
      # child of the Playwright-hydrated `<div class="leeko-board-detail">`).
      body: ".leeko-board-detail__contents"

  - id: yoon-yang
    name: 화우
    language: ko
    type: js-render
    url: https://www.yoonyang.com/kor/insights/newsletters
    wait_for: "ul#contentsList > li"
    timezone: Asia/Seoul
    enabled: true
    detail_tier: 'js-render'  # Phase 7 migration — explicit declaration
    selectors:
      list_item: "ul#contentsList > li"
      title: ".tit"
      link:
        selector: "a"
        regex: "doView\\((\\d+)\\)"
        template: "/kor/insights/newsletter/{1}"

  # ----- KR js-render firm (NEW IN PHASE 4, no Phase 2 placeholder) -----
  - id: barun
    name: 법무법인(유한) 바른
    language: ko
    type: js-render
    url: https://barunlaw.com/barunnews/N
    wait_for: ".articlebox"
    timezone: Asia/Seoul
    enabled: true
    detail_tier: 'js-render'  # Phase 7 migration — explicit declaration
    selectors:
      list_item: ".articlebox"
      title: ".article_tit"
      link: "a"
      date: ".article_date"
      # Phase 7-04 body selector (2026-04-20): barun detail pages are
      # image-only HTML email templates (<table id="Table_01"> wrapping
      # <img> tiles with empty alt attributes). Zero textual body content
      # is available by design — the newsletter is rendered as JPG/PNG
      # images rather than HTML prose. Setting this selector documents
      # the intended scope (the tile table) even though text extraction
      # returns ~0 chars; SUMM-06 B3 guard absorbs the missing body by
      # skipping Gemini. Phase 10/11 monitor candidate: either OCR path
      # or mark barun as title-only in the digest.
      body: "#Table_01"

  # ----- US js-render firm (1) — activated in Phase 4 (probe-verified 2026-04-19) -----
  - id: latham
    name: Latham & Watkins
    language: en
    type: js-render
    url: https://www.lw.com/en/insights-landing
    wait_for: ".content-card"
    timezone: America/New_York
    enabled: true
    detail_tier: 'js-render'  # Phase 7 migration — explicit declaration
    selectors:
      list_item: ".content-card"
      title: ".content-card__title"
      link: "a"
