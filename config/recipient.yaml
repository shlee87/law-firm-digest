# config/recipient.yaml
# 다이제스트 수신 이메일 주소.
#
# [수신자 한 명] — 한 줄 문자열:
#   recipient: user@example.com
#
# [수신자 여러 명] — YAML 리스트 (각 줄에 하이픈):
#   recipient:
#     - user1@example.com
#     - user2@example.com
#
# 환경변수 RECIPIENT_EMAIL 이 있으면 이 파일보다 우선 적용됩니다 (D-05).
# 환경변수로 여러 명 지정하려면 쉼표로 구분:
#   RECIPIENT_EMAIL=user1@example.com,user2@example.com
#
# 참고: 리스트 사용 시 첫 번째 이메일이 "from" 주소로도 쓰입니다
# (Gmail App Password 를 인증한 계정과 일치해야 발송 성공).
# 본인 Gmail 을 맨 앞에 두세요. GMAIL_FROM_ADDRESS 를 설정하면 override 가능.
recipient: your.email@example.com
