# .github/workflows/daily.yml
#
# LegalNewsletter — scheduled daily digest pipeline.
#
# Runs src/main.ts once per day at 09:00 UTC (18:00 KST, OPS-01). Executes the
# full Phase 1 fetch → dedup → summarize → mail → state pipeline, then commits
# the updated state/seen.json back to the repository via git-auto-commit-action.
#
# Pitfall guards baked in (see .planning/phases/01-foundation-vertical-slice/
# 01-RESEARCH.md §Pitfalls and 01-12-PLAN.md <threat_model>):
#   - [skip ci] in commit message prevents an infinite workflow loop
#     (Pitfall "What NOT to Use" — state commit triggering another run).
#   - concurrency group with cancel-in-progress: false serializes overlapping
#     runs so a manual workflow_dispatch can't race the scheduled run and
#     corrupt state/seen.json (Pitfall #5, OPS-02).
#   - permissions: contents: write is the minimum GITHUB_TOKEN scope needed
#     for git-auto-commit-action to push state back (COMP-04 private-repo OK).
#   - No sub-module recursion on checkout — .gsd-patches is local-dev
#     tooling and must NOT be initialized in CI (default behavior).
#   - setup-node@v6 cache: 'pnpm' relies on the packageManager field in
#     package.json (pinned to pnpm@9.15.0 in plan 01, verified by W3
#     pre-flight in plan 12 Task 1).
#   - workflow_dispatch trigger enables manual smoke tests and gap closure
#     from the GitHub UI without waiting for the next scheduled run.

name: Daily Digest

on:
  schedule:
    - cron: '0 9 * * *' # 09:00 UTC = 18:00 KST (OPS-01)
  workflow_dispatch: {} # manual trigger for smoke tests / gap closure

concurrency: # OPS-02 — serialize overlapping runs (Pitfall #5)
  group: digest-pipeline
  cancel-in-progress: false

permissions:
  contents: write # required by stefanzweifel/git-auto-commit-action
  issues: write # required for failure-notification step (gh issue create)

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        # No `version:` input — package.json "packageManager" is the single
        # source of truth (pinned to pnpm@9.15.0 by plan 01 W3). Specifying
        # both causes pnpm/action-setup@v5 to reject with ERR_PNPM_BAD_PM_VERSION.
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run daily digest pipeline
        id: run_pipeline
        run: pnpm tsx src/main.ts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }} # optional override (D-05)
          # GMAIL_FROM_ADDRESS: ${{ secrets.GMAIL_FROM_ADDRESS }}    # optional
      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore(state): update seen items and archive [skip ci]'
          # Phase 3 OPS-09 addition: archive/**/*.html rides the same commit as
          # state/seen.json. Space-separated multi-pattern accepted by action v7.
          file_pattern: 'state/seen.json archive/**/*.html'
      - name: Open issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Daily digest failed — run ${{ github.run_id }}" \
            --body "$(cat <<'EOF'
          **Workflow run:** https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Commit:** ${{ github.sha }}
          **Triggered by:** ${{ github.event_name }}
          **Started:** ${{ github.event.repository.updated_at }}

          ## Likely causes (check in order)

          | Symptom in logs | Fix |
          |-----------------|-----|
          | `ZodError ... recipient` | \`RECIPIENT_EMAIL\` 형식 오류 — Settings → Secrets 에서 수정 |
          | \`535 5.7.8\` or \`GMAIL_AUTH_FAILURE\` | App Password 만료/폐기 — https://myaccount.google.com/apppasswords 에서 재발급 후 \`GMAIL_APP_PASSWORD\` secret 업데이트 |
          | \`401\` or \`API_KEY_INVALID\` from Gemini | \`GEMINI_API_KEY\` 만료 — https://aistudio.google.com/app/apikey 에서 재발급 |
          | \`429\` flood from Gemini | free-tier quota 소진, 내일 다시 시도 (p-retry 가 이미 flash-lite 로 fallback 시도함) |
          | \`ZodError ... firms\` | \`config/firms.yaml\` 형식 오류 |
          | \`ENOTFOUND\` or \`getaddrinfo\` | 해당 로펌 사이트 DNS 실패 — 일시적 네트워크 문제일 가능성 |

          ## Next steps

          1. 위 run 링크에서 전체 로그 확인
          2. 원인 파악 후 수정
          3. Actions 탭 → "Daily Digest" → **Run workflow** 로 수동 재실행
          4. 재실행 성공 확인 후 이 issue close

          ---
          _Auto-created by .github/workflows/daily.yml failure step._
          EOF
          )"
